version: 1
enable_scan_on_push: true
prevent_push_when_possible: true

rules:
  - id: 1
    description: 'Private MongoDB URI'
    pattern: 'mongodb\+srv:\/\/[a-zA-Z0-9]+:[a-zA-Z0-9]+@'
    type: 'regex'

  - id: 2
    description: 'JWT Secret Key'
    pattern: 'JWT_SECRET\s*=\s*["\'][^"\']{10,}["\']'
    type: 'regex'

  - id: 3
    description: 'API Keys and Tokens'
    pattern: '(api_key|apikey|api-key|token|secret|password)\s*[:=]\s*["\'][^"\']{8,}["\']'
    type: 'regex'

  - id: 4
    description: 'AWS Credentials'
    pattern: '(AKIA|aws_secret_access_key)'
    type: 'string'

  - id: 5
    description: 'Private Keys'
    pattern: '-----BEGIN (RSA|DSA|EC|OPENSSH|PRIVATE) KEY-----'
    type: 'regex'

  - id: 6
    description: 'GitHub Tokens'
    pattern: 'gh[a-z]_[A-Za-z0-9_]{36,255}'
    type: 'regex'

  - id: 7
    description: 'Vercel Tokens'
    pattern: 'vercel_[a-zA-Z0-9]{20,}'
    type: 'regex'
