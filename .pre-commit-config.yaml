# Pre-commit Configuration
# Install with: pip install pre-commit
# Setup with: pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-docstring-is-first
        name: Check docstring is first

  # Python code quality
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python code (Black)
        language_version: python3.10
        files: ^backend/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        name: Lint Python code (Ruff)
        args: [--fix]
        files: ^backend/

  # Python security
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.1
    hooks:
      - id: forbid-crlf
        name: Forbid CRLF line endings
      - id: forbid-tabs
        name: Forbid tabs

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(backend/tests/|docs/|\.github/)
        types: [python]

  # JavaScript/TypeScript
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.55.0
    hooks:
      - id: eslint
        name: Lint JavaScript/TypeScript
        files: ^frontend/src/
        types: [javascript, jsx, typescript, tsx]
        additional_dependencies: ['eslint', 'eslint-config-next']
        args: [--fix]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.1
    hooks:
      - id: prettier
        name: Format YAML files
        files: ^\.github/workflows/.*\.yml$
        types: [yaml]

  # Custom secrets detection
  - repo: local
    hooks:
      - id: secrets-check
        name: Detect hardcoded secrets
        entry: python .githooks/pre-commit
        language: system
        types: [python, text]
        stages: [commit]
